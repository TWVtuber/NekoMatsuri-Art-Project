      content="貓祭不繪讓你俄史計劃作品展示頁。"

  <body class="work-page activity-visible">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="index.html#activity" aria-label="回活動首頁">
        </a>
        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-navigation"
          aria-label="開啟導覽列"
        >
          <span class="nav-toggle__line"></span>
          <span class="nav-toggle__line"></span>
          <span class="nav-toggle__line"></span>
        </button>
        <nav class="site-nav" id="site-navigation" aria-label="活動導覽">

        </nav>
        <a
          class="header-submit"
          href="https://forms.gle/M6ds1JfNyQWvcxud7"
          target="_blank"
          rel="noopener noreferrer"
          >我要投稿！</a
        >
      </div>
    </header>

    <main class="page-content work-page__content">
      <section
        class="work-gallery section"
        id="works"
        aria-labelledby="works-title"
      >
        <div class="section-title">
          <span></span>
          <h1 id="works-title">作品展示</h1>
          <span></span>
        </div>
        <div class="work-gallery__paper paper-card">
          <span class="tape tape--blue" aria-hidden="true"></span>
          <div class="work-gallery__toolbar" aria-label="作品篩選工具">
            <div class="work-gallery__filters" role="list">
              <button
                class="work-gallery__filter is-active"
                type="button"
                data-work-filter="all"
                aria-pressed="true"
              >
                所有類別
              </button>
              <button
                class="work-gallery__filter"
                type="button"
                data-work-filter="animation"
                aria-pressed="false"
              >
                動畫
              </button>
              <button
                class="work-gallery__filter"
                type="button"
                data-work-filter="comic"
                aria-pressed="false"
              >
                漫畫
              </button>
              <button
                class="work-gallery__filter"
                type="button"
                data-work-filter="illustration"
                aria-pressed="false"
              >
                插畫
              </button>
            </div>
            <label class="work-gallery__search">
              <span class="visually-hidden">搜尋作品</span>
              <input
                type="search"
                data-work-search
                placeholder="請輸入名稱、作者或關鍵字"
                autocomplete="off"
              />
              <span class="material-symbols-outlined" aria-hidden="true"
                >search</span
              >
            </label>
          </div>
          <div class="work-gallery__grid" data-work-grid>
            <article
              class="work-gallery__item work-gallery__item--landscape"
              data-work-category="animation"
              data-work-keywords="動畫 no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--landscape"
              data-work-category="comic"
              data-work-keywords="漫畫 no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--landscape"
              data-work-category="illustration"
              data-work-keywords="插畫 no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--portrait"
              data-work-category="animation"
              data-work-keywords="動畫 portrait no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--landscape"
              data-work-category="comic"
              data-work-keywords="漫畫 warm no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--landscape"
              data-work-category="illustration"
              data-work-keywords="插畫 no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--landscape"
              data-work-category="animation"
              data-work-keywords="動畫 no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--landscape"
              data-work-category="comic"
              data-work-keywords="漫畫 cream no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--square"
              data-work-category="illustration"
              data-work-keywords="插畫 square no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--landscape"
              data-work-category="animation"
              data-work-keywords="動畫 pink no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--landscape"
              data-work-category="comic"
              data-work-keywords="漫畫 no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--landscape"
              data-work-category="illustration"
              data-work-keywords="插畫 no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--portrait"
              data-work-category="animation"
              data-work-keywords="動畫 tall no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--square"
              data-work-category="comic"
              data-work-keywords="漫畫 square no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--landscape"
              data-work-category="illustration"
              data-work-keywords="插畫 no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
            <article
              class="work-gallery__item work-gallery__item--portrait"
              data-work-category="comic"
              data-work-keywords="漫畫 tall no file"
            >
              <span class="material-symbols-outlined work-gallery__placeholder-icon" aria-hidden="true">image</span>
            </article>
          </div>
          <p class="work-gallery__empty" data-work-empty hidden>
            找不到符合條件的作品。
          </p>
        </div>
      </section>
    </main>
